<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Request Triage</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <h1>Mini Request Triage</h1>
    <section id="register-section">
        <h2>Register</h2>
        <form id="register-form">
            <label for="register-username">
                Username: 
                <input id="register-username" name="username" type="text" required>
            </label>

            <label for="register-password">
                Password: 
                <input id="register-password" name="password" type="password" required>
            </label>

            <label for="register-role">
                Role: 
                <select id="register-role" name="role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
            </label>
            
            <button type="submit">Submit</button>
        </form>
        <p id="register-message"></p>
    </section>

    <section id="login-section">
        <h2>Login</h2>
        <form id="login-form">
            <label for="login-username">
                Username: 
                <input id="login-username" name="username" type="text" required>
            </label>

            <label for="login-password">
                Password: 
                <input id="login-password" name="password" type="password" required>
            </label>

            <button type="submit">Submit</button>
        </form>
        <p id="login-message"></p>
    </section>

    <section id="current-user-section" hidden>
        <h2>Current User</h2>
        <p id="current-user">Not logged in</p>
        <button id="logout-button" type="button">Log out</button>
    </section>

    <section id="create-request-section" hidden>
        <h2>Create Request</h2>
        <form id="create-request-form">
            <label for="request-title">
                Title: 
                <input id="request-title" name="title" type="text" required>
            </label>
            
            <label for="request-description">
                Description: 
                <textarea id="request-description" name="description" required></textarea>
            </label>
            
            <label for="request-category">
                Category : 
                <select id="request-category" name="category">
                    <option value="bug">Bug</option>
                    <option value="feature">Feature</option>
                    <option value="question">Question</option>
                    <option value="billing">Billing</option>
                    <option value="other">Other</option>
                </select>
            </label>
            
            <label for="request-priority">
                Priority : 
                <select id="request-priority" name="priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </label>
            
            <button type="submit">Submit</button>
        </form>

        <p id="create-request-message"></p>
    </section>

    <section id="request-list-section" hidden>
        <h2>My Request</h2>
        
        <div>
        <label for="status-filter">
            Status: 
            <select id="status-filter">
                <option value="">All</option>
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="closed">Closed</option>
            </select>
        </label>
        

        <label for="priority-filter">
            Priority: 
            <select id="priority-filter">
                <option value="">All</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </label>
        
        <button id="filter-button" type="button">Filter</button>
        </div>

        <p id="request-list-message"></p>
        <div id="request-list"></div>
    </section>

    <section id="admin-section" hidden>
        <h2>Admin Panel</h2>

        <button id="load-admin-users-button" type="button">
            Load All Users
        </button>

        <button id="load-admin-requests-button" type="button">
            Load All Requests
        </button>

        <p id="admin-message"></p>
        <div id="admin-results"></div>
    </section>

    <script src="./app.js"></script>
</body>
</html>
